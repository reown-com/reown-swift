name: release
run-name: "Release ${{ inputs.app }} — ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      app:
        type: choice
        description: Which sample app to release
        options:
        - DApp
        - WalletApp
        - Showcase

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest-xlarge

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Select Xcode 26 (iOS 26 SDK)
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Setup SSH for Match
      uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
      with:
        ssh-private-key: ${{ secrets.MATCH_SSH_KEY }}

    - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          .build
          SourcePackagesCache
          DerivedDataCache
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Release
      id: release
      shell: bash
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
        APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
        WALLETAPP_SENTRY_DSN: ${{ secrets.WALLETAPP_SENTRY_DSN }}
        MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      run: |
        make release APPLE_ID=${{ secrets.APPLE_ID }} PROJECT_ID=${{ secrets.RELEASE_PROJECT_ID }} WALLETAPP_SENTRY_DSN=${{ secrets.WALLETAPP_SENTRY_DSN }} MIXPANEL_TOKEN=${{secrets.MIXPANEL_TOKEN}} APP=${{ github.event.inputs.app }}

    - name: Send Slack notification
      if: always() && !cancelled()
      continue-on-error: true
      uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
        payload: |
          {
            "text": "iOS Build Report - ${{ inputs.app }}",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "🍎 iOS Build Report" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*App:*\n`${{ inputs.app }}`" },
                  { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                  { "type": "mrkdwn", "text": "*Status:*\n`${{ steps.release.outcome == 'success' && '✅ Success' || '❌ Failed' }}`" },
                  { "type": "mrkdwn", "text": "*Triggered by:*\n`${{ github.actor }}`" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "View Workflow Run" },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
